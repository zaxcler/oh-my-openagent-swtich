name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.1.0) to release'
        required: true
        default: 'manual'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: app,dmg
          - platform: ubuntu-22.04
            bundles: deb,appimage
          - platform: windows-latest
            bundles: msi,nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build --bundles ${{ matrix.bundles }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true

      - name: List build outputs (debug)
        if: always()
        continue-on-error: true
        run: |
          echo "=== target/release/bundle/ ==="
          ls -la src-tauri/target/release/bundle/ 2>&1 || echo "no bundle dir"
          echo "=== find all bundle files ==="
          find src-tauri/target/release/bundle -type f 2>&1 || echo "nothing found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | sort || echo "no files"

      - name: Collect release assets
        id: assets
        run: |
          FILES=$(find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.app" -o -name "*.AppImage" \) 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
            echo "No binary assets found"
          else
            echo "has_assets=true" >> "$GITHUB_OUTPUT"
            echo "$FILES" | sort
          fi

      - name: Create draft release with assets
        if: steps.assets.outputs.has_assets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}"
          # Collect all binary files
          ASSETS=$(find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.app" \) | sort)
          echo "Uploading assets:"
          echo "$ASSETS"
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --draft \
            --generate-notes \
            --clobber \
            $ASSETS

      - name: Create draft release without assets
        if: steps.assets.outputs.has_assets != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}"
          echo "No binary assets found, creating release with source only"
          gh release create "$TAG" --draft --generate-notes
